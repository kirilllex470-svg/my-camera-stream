<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Стрим на GitHub</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: #fff; padding-top: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        video { width: 45%; background: #000; margin: 10px; border: 2px solid #333; border-radius: 10px; }
        .box { margin: 15px; padding: 15px; background: #2a2a2a; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input, button { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin: 5px; }
        button { background: #28a745; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Прямой эфир через GitHub Pages</h1>
        
        <div class="box">
            <h3>Я Стример</h3>
            <p>Скопируйте этот ID и отправьте друзьям:</p>
            <h2 id="my-id" style="color: #007bff;">Получение ID...</h2>
        </div>

        <div class="box">
            <h3>Я Зритель</h3>
            <p>Вставьте ID стримера ниже:</p>
            <input type="text" id="peer-id" placeholder="ID стримера">
            <button onclick="connectToStream()">Смотреть трансляцию</button>
        </div>

        <br>
        <video id="my-camera" autoplay muted playsinline></video>
        <video id="friend-camera" autoplay playsinline></video>
    </div>

    <script>
        const peer = new Peer();
        let localStream;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
        });

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById('my-camera').srcObject = stream;
            })
            .catch(err => console.error("Камера недоступна:", err));

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', remoteStream => {
                document.getElementById('friend-camera').srcObject = remoteStream;
            });
        });

        function connectToStream() {
            const targetId = document.getElementById('peer-id').value;
            const call = peer.call(targetId, localStream);
            call.on('stream', remoteStream => {
                document.getElementById('friend-camera').srcObject = remoteStream;
            });
        }
    </script>
</body>
</html>
