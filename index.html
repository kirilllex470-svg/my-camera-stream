<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стрим без кодов</title>
    <!-- Подключаем самую стабильную версию PeerJS -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 480px; background: #000; border-radius: 8px; margin-top: 10px; border: 2px solid #333; }
        .box { font-size: 18px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 600px; text-align: center; }
    </style>
</head>
<body>

    <h1>Моя трансляция (Авто-подключение)</h1>
    <div id="status" class="box">Включаем камеру...</div>
    <video id="my-video" autoplay muted playsinline></video>

    <script>
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then((stream) => {
            document.getElementById('my-video').srcObject = stream;
            document.getElementById('status').innerText = "Подключаемся к серверу...";

            // Создаем подключение с фиксированным ID комнаты. 
            // ЗАМЕНИТЕ 'my-unique-camera-room-2026' НА СВОЕ СЕКРЕТНОЕ СЛОВО!
            const peer = new Peer('my-unique-camera-room-2026');

            peer.on('open', (id) => {
                document.getElementById('status').innerHTML = `🟢 Трансляция готова!<br>Друг может заходить на страницу зрителя.`;
            });

            // Когда зритель заходит на свою страницу, он автоматически "звонит" вам
            peer.on('call', (call) => {
                // Браузер сам автоматически отвечает и отдает видео
                call.answer(stream);
                document.getElementById('status').innerHTML = `🟢 Зритель подключился и смотрит!`;
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    document.getElementById('status').innerText = "Ошибка: Это имя комнаты уже занято. Придумайте другое в коде!";
                } else {
                    document.getElementById('status').innerText = "Ошибка сети: " + err.type;
                }
            });
        }).catch(err => {
            document.getElementById('status').innerText = "Ошибка доступа к камере: " + err.message;
        });
    </script>
</body>
</html>
