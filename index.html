<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Прямая трансляция для друзей</title>
    <!-- Подключаем библиотеку PeerJS, которая связывает компьютеры напрямую -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        video { width: 80%; max-width: 700px; background: #000; border: 2px solid #333; border-radius: 8px; }
        .btn { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #peer-id-display { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

    <h1>🔴 Мой Стрим (WebRTC)</h1>
    
    <!-- Сюда выводится ID вашей комнаты -->
    <p>ID вашей трансляции: <span id="peer-id-display">Создание...</span></p>

    <div>
        <button class="btn" onclick="startStream()">1. Запустить трансляцию экрана</button>
    </div>

    <div>
        <input type="text" id="connect-id" placeholder="Вставьте ID друга">
        <button class="btn" style="background:#007bff;" onclick="connectToFriend()">Подключиться к другу</button>
    </div>

    <video id="remote-video" autoplay playsinline controls></video>

    <script>
        let peer = new Peer(); // Создаем подключение к бесплатному серверу связи
        let localStream;

        // Показываем ваш ID, когда он создался
        peer.on('open', (id) => {
            document.getElementById('peer-id-display').innerText = id;
        });

        // 1. Функция захвата экрана компьютера
        async function startStream() {
            try {
                // Запрашиваем захват экрана и звука
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('remote-video').srcObject = localStream;
                alert("Экран захвачен! Передайте ваш ID другу.");
            } catch (err) {
                console.error("Ошибка захвата экрана: ", err);
            }
        }

        // Ждем, пока кто-то подключится к нам
        peer.on('call', (call) => {
            call.answer(localStream); // Отправляем наш поток экрана другу
            call.on('stream', (stream) => {
                document.getElementById('remote-video').srcObject = stream;
            });
        });

        // 2. Функция для друга, чтобы подключиться по ID
        function connectToFriend() {
            const friendId = document.getElementById('connect-id').value;
            if (!friendId) return alert("Введите ID трансляции!");
            
            // Звоним другу
            let call = peer.call(friendId, localStream);
            call.on('stream', (stream) => {
                document.getElementById('remote-video').srcObject = stream;
            });
        }
    </script>
</body>
</html>
