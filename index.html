<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Личный Стрим</title>
    <!-- Подключаем библиотеку для связи между компьютерами -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; }
        video { width: 45%; background: #000; margin: 10px; border-radius: 8px; }
        .box { margin: 20px; padding: 15px; background: #333; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Прямой эфир на 5 человек</h1>
    
    <div class="box">
        <p>Ваш секретный номер трансляции (отправьте его 5 друзьям):</p>
        <h2 id="my-id">Загрузка...</h2>
    </div>

    <div class="box">
        <p>Подключиться к другу (если вы зритель):</p>
        <input type="text" id="peer-id" placeholder="Вставьте номер стрима">
        <button onclick="startListening()">Смотреть стрим</button>
    </div>

    <br>
    <video id="local-video" autoplay muted playsinline></video>
    <video id="remote-video" autoplay playsinline></video>

    <script>
        // Создаем подключение
        const peer = new Peer();
        let myStream;

        // Показываем ваш ID на экране
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // Включаем вашу камеру и микрофон при запуске страницы
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then((stream) => {
                myStream = stream;
                document.getElementById('local-video').srcObject = stream;
            })
            .catch(err => console.error("Нет доступа к камере:", err));

        // Когда зритель звонит вам, ваш браузер автоматически отправляет ему видео
        peer.on('call', (call) => {
            call.answer(myStream);
            // Если зритель тоже включит камеру, вы его увидите
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        });

        // Функция для зрителя: подключиться к стримеру
        function startListening() {
            const targetId = document.getElementById('peer-id').value;
            const call = peer.call(targetId, myStream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }
    </script>
</body>
</html>
