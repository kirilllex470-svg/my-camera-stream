<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Трансляция экрана (До 5 человек)</title>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 480px; background: #000; border-radius: 8px; margin: 10px; border: 2px solid #333; }
        .box { font-size: 18px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 600px; text-align: left; }
        textarea { width: 95%; height: 60px; margin-top: 5px; background: #333; color: #00ff00; border: 1px solid #555; padding: 8px; font-size: 14px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .btn-blue { background: #00bcff; }
        .friend-panel { border-bottom: 1px dashed #555; padding-bottom: 15px; margin-bottom: 15px; }
        .friend-panel:last-child { border: none; }
    </style>
</head>
<body>

    <h1>Трансляция экрана (До 5 человек)</h1>
    
    <div id="status" class="box" style="text-align: center;">
        Нажмите кнопку ниже, чтобы выбрать экран для трансляции
    </div>
    
    <!-- Окно предпросмотра вашего экрана -->
    <video id="my-video" autoplay muted playsinline></video>
    <br>
    <button id="startBtn" onclick="startStream()">1. Включить демонстрацию экрана</button>

    <!-- Раздел управления подключениями -->
    <div id="connectionsSection" class="box" style="display:none;">
        <h3>Управление подключениями:</h3>
        <div id="panelsContainer"></div>
    </div>

    <script>
        let localStream;
        let connections = [
            { id: 1, pc: null, name: "Друг 1" },
            { id: 2, pc: null, name: "Друг 2" },
            { id: 3, pc: null, name: "Друг 3" },
            { id: 4, pc: null, name: "Друг 4" },
            { id: 5, pc: null, name: "Друг 5" }
        ];

        async function startStream() {
            try {
                document.getElementById('status').innerText = "Выбираем экран...";
                
                // ГЛАВНОЕ ИЗМЕНЕНИЕ: Используем getDisplayMedia вместо getUserMedia
                // Браузер сам откроет системное окно выбора: весь экран, окно программы или вкладка
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: true // Позволяет также делиться системным звуком, если поставить галочку при выборе
                });
                
                document.getElementById('my-video').srcObject = localStream;
                
                // Если пользователь нажмет кнопку "Остановить показ" в браузере
                localStream.getVideoTracks()[0].onended = function () {
                    document.getElementById('status').innerText = "Трансляция экрана остановлена.";
                    document.getElementById('connectionsSection').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'inline-block';
                };

                document.getElementById('status').innerText = "Экран успешно захвачен! Сгенерируйте коды ниже.";
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('connectionsSection').style.display = 'block';

                renderPanels();
            } catch (err) {
                document.getElementById('status').innerText = "Ошибка: " + err.message;
            }
        }

        function renderPanels() {
            const container = document.getElementById('panelsContainer');
            container.innerHTML = "";

            connections.forEach(conn => {
                const panel = document.createElement('div');
                panel.className = 'friend-panel';
                panel.innerHTML = `
                    <strong style="color:#00bcff;">${conn.name}:</strong>
                    <div id="action-zone-${conn.id}">
                        <button onclick="generateOffer(${conn.id})">Создать код для этого друга</button>
                    </div>
                `;
                container.appendChild(panel);
            });
        }

        async function generateOffer(id) {
            const conn = connections.find(c => c.id === id);
            const zone = document.getElementById(`action-zone-${id}`);
            
            zone.innerHTML = "Генерация кода...";

            conn.pc = new RTCPeerConnection();
            
            localStream.getTracks().forEach(track => conn.pc.addTrack(track, localStream));
            
            const offer = await conn.pc.createOffer();
            await conn.pc.setLocalDescription(offer);
            
            setTimeout(() => {
                const base64Code = btoa(JSON.stringify(conn.pc.localDescription));
                zone.innerHTML = `
                    <p style="margin:5px 0; font-size:14px; color:white;">1. Скопируйте и отправьте этот код другу:</p>
                    <textarea readonly onclick="this.select()">${base64Code}</textarea>
                    <p style="margin:5px 0; font-size:14px; color:white;">2. Вставьте ответный код от этого друга:</p>
                    <textarea id="answer-${id}" placeholder="Вставьте ответ..."></textarea>
                    <button class="btn-blue" onclick="acceptAnswer(${id})">Подключить</button>
                `;
            }, 1000);
        }

        async function acceptAnswer(id) {
            const conn = connections.find(c => c.id === id);
            const answerText = document.getElementById(`answer-${id}`).value.trim();
            const zone = document.getElementById(`action-zone-${id}`);

            if (!answerText) return alert("Пожалуйста, вставьте ответный код!");

            try {
                const answerDesc = JSON.parse(atob(answerText));
                await conn.pc.setRemoteDescription(new RTCSessionDescription(answerDesc));
                zone.innerHTML = "<span style='color:#00ff00; font-weight:bold;'>✓ Подключено успешно!</span>";
            } catch (err) {
                alert("Ошибка применения кода: " + err.message);
            }
        }
    </script>

</body>
</html>
