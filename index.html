<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стример (Короткие коды)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 480px; background: #000; border-radius: 8px; margin-top: 10px; border: 2px solid #333; }
        .box { font-size: 16px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 600px; text-align: left; }
        textarea { width: 95%; height: 35px; margin-top: 5px; background: #333; color: #00ff00; border: 1px solid #555; padding: 8px; font-size: 14px; resize: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; color: black; }
        .btn-blue { background: #00bcff; }
    </style>
</head>
<body>

    <h1>Моя трансляция</h1>
    
    <div id="status" class="box" style="text-align: center;">
        Нажмите кнопку, чтобы включить камеру
    </div>
    
    <video id="my-video" autoplay muted playsinline></video>
    <br>
    <button id="startBtn" onclick="startStream()">Запустить трансляцию</button>

    <div id="answerSection" class="box" style="display:none;">
        <label><strong>Шаг 2:</strong> Вставьте короткий ОТВЕТ от друга:</label>
        <textarea id="answerCode" placeholder="Вставьте сюда короткий код от друга..."></textarea>
        <button class="btn-blue" onclick="acceptAnswer()">Включить видео другу</button>
    </div>

    <script>
        let pc;
        function pack(desc) {
            const lines = desc.sdp.split('\r\n');
            const ufrag = lines.find(l => l.startsWith('a=ice-ufrag:')).split(':');
            const pwd = lines.find(l => l.startsWith('a=ice-pwd:')).split(':');
            return `${ufrag[1]}_${pwd[1]}`;
        }

        async function startStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('my-video').srcObject = stream;
                
                // Fixed: Removed server options to completely eliminate the parsing error
                pc = new RTCPeerConnection(); 
                stream.getTracks().forEach(track => pc.addTrack(track, stream));
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        const shortCode = pack(pc.localDescription);
                        document.getElementById('status').innerHTML = `
                            <p style="color:white; margin:0; font-weight:bold;">Шаг 1: Скопируйте этот маленький код и отправьте другу:</p>
                            <textarea readonly onclick="this.select()">${shortCode}</textarea>
                        `;
                        document.getElementById('answerSection').style.display = 'block';
                        document.getElementById('startBtn').style.display = 'none';
                    }
                };
            } catch (err) { alert("Ошибка: " + err.message); }
        }

        async function acceptAnswer() {
            const text = document.getElementById('answerCode').value.trim();
            const [ufrag, pwd] = text.split('_');
            const sdp = `v=0\r\no=- 0 0 IN IP4 0.0.0.0\r\ns=-\r\nt=0 0\r\na=ice-ufrag:${ufrag}\r\na=ice-pwd:${pwd}\r\nm=video 9 RTP/AVP 96\r\nc=IN IP4 0.0.0.0\r\na=rtpmap:96 H264/90000\r\n`;
            await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: sdp }));
            document.getElementById('status').innerHTML = "🟢 Соединение установлено!";
            document.getElementById('answerSection').style.display = 'none';
        }
    </script>
</body>
</html>
