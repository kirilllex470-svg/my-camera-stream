<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель Стримера</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding: 0; margin: 0; }
        h1 { margin-top: 20px; font-size: 24px; color: #00ff00; }
        .info { font-size: 16px; background: #222; padding: 10px; border-radius: 5px; display: inline-block; margin-top: 10px; }
        #meet-box { width: 100%; height: 80vh; margin-top: 15px; background: #000; }
    </style>
</head>
<body>

    <h1>Трансляция запущена!</h1>
    <div class="info">Вы вещаете как Стример. Друзья должны открыть файл viewer.html</div>
    
    <!-- Сюда встроится твоя камера -->
    <div id="meet-box"></div>

    <!-- Загружаем официальный скрипт Jitsi -->
    <script src="https://jit.si"></script>
    <script>
        window.onload = function() {
            // Придумай свое секретное название комнаты (только английские буквы и цифры)
            const MY_SECRET_ROOM = "my-private-camera-room-00000"; 

            const options = {
                roomName: MY_SECRET_ROOM,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-box'),
                lang: 'ru',
                interfaceConfigOverwrite: {
                    // Оставляем тебе все кнопки управления
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'fullscreen', 'desktop']
                }
            };
            // Запускаем стрим
            new JitsiMeetExternalAPI("meet.jit.si", options);
        };
    </script>
</body>
</html>
