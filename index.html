<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Стример (Короткие коды)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 480px; background: #000; border-radius: 8px; margin-top: 10px; border: 2px solid #333; }
        .box { font-size: 16px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 600px; text-align: left; }
        textarea { width: 95%; height: 60px; margin-top: 5px; background: #333; color: #00ff00; border: 1px solid #555; padding: 8px; font-size: 12px; word-break: break-all; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; color: black; }
        .btn-blue { background: #00bcff; }
    </style>
</head>
<body>

    <h1>Моя трансляция</h1>
    <div id="status" class="box" style="text-align: center;">Нажмите кнопку, чтобы включить камеру</div>
    <video id="my-video" autoplay muted playsinline></video>
    <br>
    <button id="startBtn" onclick="startStream()">Запустить трансляцию</button>

    <div id="answerSection" class="box" style="display:none;">
        <label><strong>Шаг 2:</strong> Вставьте ОТВЕТ от друга:</label>
        <textarea id="answerCode" placeholder="Вставьте сюда код от друга..."></textarea>
        <button class="btn-blue" onclick="acceptAnswer()">Включить видео другу</button>
    </div>

    <script>
        let pc;
        async function startStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('my-video').srcObject = stream;
                document.getElementById('status').innerText = "Создаем подключение...";
                
                pc = new RTCPeerConnection(); 
                stream.getTracks().forEach(track => pc.addTrack(track, stream));
                
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                // Wait for network gathering to finish
                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        // Compress the real code so it's much shorter than before
                        const compressed = btoa(JSON.stringify(pc.localDescription));
                        document.getElementById('status').innerHTML = `
                            <p style="color:white; margin:0; font-weight:bold;">Шаг 1: Скопируйте этот код и отправьте другу:</p>
                            <textarea readonly onclick="this.select()">${compressed}</textarea>
                        `;
                        document.getElementById('answerSection').style.display = 'block';
                        document.getElementById('startBtn').style.display = 'none';
                    }
                };
            } catch (err) { document.getElementById('status').innerText = "Ошибка: " + err.message; }
        }

        async function acceptAnswer() {
            try {
                const text = document.getElementById('answerCode').value.trim();
                const parsed = JSON.parse(atob(text));
                await pc.setRemoteDescription(new RTCSessionDescription(parsed));
                document.getElementById('status').innerHTML = "🟢 Соединение установлено! Трансляция идет.";
                document.getElementById('answerSection').style.display = 'none';
            } catch (err) { alert("Ошибка при чтении кода от друга: " + err.message); }
        }
    </script>
</body>
</html>
