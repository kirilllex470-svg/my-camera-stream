<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Трансляция экрана (Без ошибок)</title>
    <style>
        body { font-family: Arial; text-align: center; background: #111; color: white; padding: 20px; }
        video { width: 400px; background: #000; border-radius: 8px; border: 2px solid #333; }
        .box { font-size: 16px; color: #00ff00; margin: 15px auto; background: #222; padding: 15px; border-radius: 8px; max-width: 500px; text-align: left; }
        textarea { width: 95%; height: 60px; background: #333; color: #00ff00; border: 1px solid #555; margin: 5px 0; word-break: break-all; font-family: monospace; font-size: 12px; }
        button { padding: 8px 15px; font-size: 14px; cursor: pointer; background: #00ff00; border: none; border-radius: 4px; font-weight: bold; }
        .panel { border-bottom: 1px dashed #555; padding: 10px 0; }
    </style>
</head>
<body>

    <h1>Трансляция экрана (До 5 человек)</h1>
    <video id="my-video" autoplay muted playsinline></video>
    <br><br>
    <button id="startBtn" onclick="startStream()">1. Включить экран</button>

    <div id="box" class="box" style="display:none;">
        <h3>Друзья для подключения:</h3>
        <div id="friends"></div>
    </div>

    <script>
        let stream, pcs = {};

        async function startStream() {
            try {
                stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('my-video').srcObject = stream;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('box').style.display = 'block';
                
                let html = '';
                for(let i = 1; i <= 5; i++) {
                    html += `<div class="panel"><strong>Друг ${i}:</strong>
                        <div id="z-${i}"><button onclick="go(${i})">Создать код</button></div></div>`;
                }
                document.getElementById('friends').innerHTML = html;
            } catch (err) { alert("Ошибка: " + err.message); }
        }

        // Высокое сжатие через системный алгоритм GZIP
        async function compressData(str) {
            const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'));
            const response = new Response(stream);
            const buffer = await response.arrayBuffer();
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }

        // Распаковка GZIP
        async function decompressData(base64Str) {
            const bytes = Uint8Array.from(atob(base64Str), c => c.charCodeAt(0));
            const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
            return await new Response(stream).text();
        }

        async function go(id) {
            let pc = new RTCPeerConnection({ iceServers: [] });
            pcs[id] = pc;
            
            stream.getTracks().forEach(t => pc.addTrack(t, stream));

            pc.onicecandidate = async (e) => {
                if (!e.candidate) {
                    // Кодируем оригинальный полноценный объект, без вырезания строк
                    let shortCode = await compressData(JSON.stringify(pc.localDescription));
                    document.getElementById(`z-${id}`).innerHTML = `
                        <p style="margin:2px 0; font-size:12px;">Код для отправки:</p>
                        <textarea readonly onclick="this.select()">${shortCode}</textarea>
                        <p style="margin:2px 0; font-size:12px;">Ответ от друга:</p>
                        <textarea id="ans-${id}" placeholder="Вставь ответ..."></textarea>
                        <button style="background:#00bcff" onclick="connect(${id})">Подключить</button>`;
                }
            };
            
            await pc.setLocalDescription(await pc.createOffer());
        }

        async function connect(id) {
            let txt = document.getElementById(`ans-${id}`).value.trim();
            if(!txt) return alert("Введите ответ!");
            try {
                let decrypted = await decompressData(txt);
                await pcs[id].setRemoteDescription(new RTCSessionDescription(JSON.parse(decrypted)));
                document.getElementById(`z-${id}`).innerHTML = "<b style='color:#00ff00'>✓ Подключено!</b>";
            } catch(e) { alert("Ошибка кода: " + e.message); }
        }
    </script>
</body>
</html>
